<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>엔드필드 숙제 관리자</title>
    <style>
        :root { --main-bg: #1a1a1a; --card-bg: #2d2d2d; --accent: #ffcf00; --text: #e0e0e0; }
        body { font-family: 'Pretendard', sans-serif; background: var(--main-bg); color: var(--text); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 450px; background: var(--card-bg); padding: 25px; border-radius: 15px; border-top: 5px solid var(--accent); }
        h2 { text-align: center; color: var(--accent); margin-top: 0; }
        .reset-info { font-size: 0.8em; text-align: center; color: #888; margin-bottom: 20px; line-height: 1.5; }
        .section-title { font-weight: bold; margin-top: 25px; margin-bottom: 10px; color: var(--accent); border-left: 4px solid var(--accent); padding-left: 10px; }
        .todo-item { display: flex; align-items: center; background: #383838; margin: 8px 0; padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .todo-item:hover { background: #444; }
        input[type="checkbox"] { margin-right: 12px; width: 20px; height: 20px; accent-color: var(--accent); }
        .done span { text-decoration: line-through; color: #777; }
        button { width: 100%; margin-top: 30px; padding: 12px; background: none; color: #ff4444; border: 1px solid #ff4444; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background: #ff4444; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Endfield Checklist</h2>
        <div class="reset-info">모든 숙제는 <b>오전 5시</b>에 자동 초기화됩니다.</div>
        
        <div class="section-title">일일 숙제 (매일)</div>
        <div id="daily-list"></div>

        <div class="section-title">2일 주기 숙제 (격일)</div>
        <div id="2day-list"></div>

        <div class="section-title">4일 주기 숙제</div>
        <div id="4day-list"></div>

        <div class="section-title">주간 숙제 (월요일)</div>
        <div id="weekly-list"></div>

        <button onclick="manualReset()">전체 수동 초기화</button>
    </div>

    <script>
        // 숙제 데이터 구성
        const tasks = {
            daily: ["운송 의뢰(3개 + 개인 무릉/4번협곡)", "거점 관리 물건 판매", "일상 퀘스트(활약도 100)", "변동 수요 물자 판매", "제강호 친구 지원/정보교류", "오퍼레이터 선물", "이성 소모", "재활용센터 보상 수령"],
            p2day: ["환경관측 - 무릉 교외 관측 단말기"],
            p4day: ["필드 희귀 채집물 & 희귀 광물"],
            weekly: ["주간 활약도 달성", "주간 보스 토벌"] // 주간 숙제 예시
        };

        // 기준 시간(오전 5시)을 고려한 오늘 날짜 계산 함수
        function getGameDate(offsetDays = 0) {
            const now = new Date();
            const gameTime = new Date(now.getTime() - (5 * 60 * 60 * 1000)); // 현재 시간에서 5시간을 뺌
            if(offsetDays !== 0) gameTime.setDate(gameTime.getDate() + offsetDays);
            return gameTime;
        }

        // 초기화 로직
        function checkAutoReset() {
            const lastReset = JSON.parse(localStorage.getItem('lastResetTime') || '{}');
            const nowGameDate = getGameDate();
            const todayStr = nowGameDate.toISOString().split('T')[0];
            const currentDayOfWeek = nowGameDate.getDay(); // 0(일) ~ 6(토)
            
            // 1. 일일 초기화 (날짜가 바뀌면)
            if (lastReset.daily !== todayStr) {
                resetTasksByPrefix('daily');
                lastReset.daily = todayStr;
            }

            // 2. 주간 초기화 (마지막 초기화 이후 월요일(1)이 지났거나, 날짜 차이가 7일 이상일 때)
            const lastWeeklyDate = new Date(lastReset.weekly || '2000-01-01');
            const diffDays = Math.floor((nowGameDate - lastWeeklyDate) / (1000 * 60 * 60 * 24));
            // 월요일(1)이고 마지막 초기화가 오늘이 아닐 때
            if (currentDayOfWeek === 1 && lastReset.weekly !== todayStr) {
                resetTasksByPrefix('weekly');
                lastReset.weekly = todayStr;
            }

            // 3. N일 주기 초기화 (기준일로부터의 일수 계산)
            // 2024-01-01을 기준(Day 0)으로 잡음
            const baseDate = new Date('2024-01-01'); 
            const totalDays = Math.floor((nowGameDate - baseDate) / (1000 * 60 * 60 * 24));

            if (totalDays % 2 === 0 && lastReset.p2day !== todayStr) {
                resetTasksByPrefix('p2day');
                lastReset.p2day = todayStr;
            }
            if (totalDays % 4 === 0 && lastReset.p4day !== todayStr) {
                resetTasksByPrefix('p4day');
                lastReset.p4day = todayStr;
            }

            localStorage.setItem('lastResetTime', JSON.stringify(lastReset));
        }

        function resetTasksByPrefix(prefix) {
            Object.keys(localStorage).forEach(key => {
                if (key.startsWith(prefix)) localStorage.removeItem(key);
            });
        }

        function render() {
            renderSection('daily', 'daily-list');
            renderSection('p2day', '2day-list');
            renderSection('p4day', '4day-list');
            renderSection('weekly', 'weekly-list');
        }

        function renderSection(prefix, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            tasks[prefix].forEach((task, index) => {
                const id = `${prefix}-${index}`;
                const checked = localStorage.getItem(id) === 'true' ? 'checked' : '';
                container.innerHTML += `
                    <label class=\"todo-item ${checked ? 'done' : ''}\">\n                        <input type=\"checkbox\" id=\"${id}\" ${checked} onclick=\"toggleTask('${id}')\">\n                        <span>${task}</span>\n                    </label>`;\n            });
        }

        function toggleTask(id) {
            const cb = document.getElementById(id);
            localStorage.setItem(id, cb.checked);
            cb.parentElement.classList.toggle('done', cb.checked);
        }

        function manualReset() {
            if(confirm(\"모든 체크 기록을 삭제할까요?\")) {
                localStorage.clear();
                location.reload();
            }
        }

        // 실행
        checkAutoReset();
        render();
    </script>
</body>
</html>
