<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>엔드필드 숙제 체크리스트</title>
    <style>
        :root { --main-bg: #121212; --card-bg: #1e1e1e; --accent: #ffcf00; --text: #ffffff; --dim: #888; }
        body { font-family: 'Pretendard', sans-serif; background: var(--main-bg); color: var(--text); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 450px; background: var(--card-bg); padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-top: 4px solid var(--accent); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        h2 { color: var(--accent); margin: 0; font-size: 1.5rem; }
        .timer { font-size: 0.9rem; color: #5dade2; font-family: monospace; }
        .reset-info { font-size: 0.75rem; color: var(--dim); margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .section-title { font-weight: bold; margin-top: 25px; margin-bottom: 12px; color: var(--accent); display: flex; align-items: center; font-size: 1.1rem; }
        .section-title::before { content: '■'; font-size: 0.8rem; margin-right: 8px; }
        .todo-item { display: flex; align-items: center; background: #2a2a2a; margin: 6px 0; padding: 14px; border-radius: 8px; cursor: pointer; transition: 0.2s; border: 1px solid #333; }
        .todo-item:hover { background: #333; }
        input[type="checkbox"] { margin-right: 12px; width: 20px; height: 20px; accent-color: var(--accent); cursor: pointer; }
        .done { opacity: 0.5; }
        .done span { text-decoration: line-through; color: var(--dim); }
        .footer-btn { width: 100%; margin-top: 30px; padding: 12px; background: none; color: #ff4444; border: 1px solid #ff4444; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .footer-btn:hover { background: #ff4444; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>📋 엔드필드 숙제</h2>
            <div id="countdown" class="timer">초기화까지 00:00:00</div>
        </div>
        <div class="reset-info">매일 오전 5시 자동 초기화 (주간: 월요일 5시)</div>
        
        <div class="section-title">일일 숙제</div>
        <div id="daily-list"></div>

        <div class="section-title">2일 주기 숙제 (격일)</div>
        <div id="p2day-list"></div>

        <div class="section-title">4일 주기 숙제</div>
        <div id="p4day-list"></div>

        <div class="section-title">주간 숙제 (월요일)</div>
        <div id="weekly-list"></div>

        <button class="footer-btn" onclick="manualReset()">데이터 전체 초기화</button>
    </div>
